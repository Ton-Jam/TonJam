    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0B0F14;
            color: #FFFFFF;
            overflow-x: clip;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* JAM Coin Icon Visibility */
        img[src*="TonjamCoin"] {
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.3));
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .animate-marquee {
            animation: marquee 30s linear infinite;
        }

        .hero-gradient {
            background: linear-gradient(to right, #0B0F14 0%, rgba(11, 15, 20, 0) 60%, rgba(11, 15, 20, 0) 100%);
        }
        
        .hero-bottom-gradient {
            background: linear-gradient(to top, #0B0F14 0%, rgba(11, 15, 20, 0) 100%);
        }

        /* Custom typography refinements */
        h1, h2, h3, h4, h5, h6, .font-black {
          letter-spacing: -0.02em;
          line-height: 1.3;
        }

        /* TON Connect Button Theming */
        tc-root {
          --tc-accent-color: #2563EB;
          --tc-text-color: #ffffff;
          --tc-bg-color: #0B0F14;
        }

        .scroll-row {
          display: flex;
          overflow-x: auto;
          gap: 1rem;
          padding-bottom: 1rem;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
        }

        .scroll-row > * {
          scroll-snap-align: start;
        }
