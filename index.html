
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonjam | Decentralized Music Marketplace & NFT Platform on TON Blockchain</title>
    <meta name="description" content="Tonjam is a decentralized music marketplace on the TON blockchain. Discover, buy, and sell music NFTs from top Web3 artists. The future of artist-fan engagement in the Web3 ecosystem.">
    <meta name="keywords" content="decentralized music marketplace, TON blockchain, music NFTs, Web3 artists, Tonjam, crypto music, NFT marketplace, Web3 music, independent artists, audio NFTs, The Open Network">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Tonjam | Decentralized Music & NFT Marketplace on TON">
    <meta property="og:description" content="Discover, buy, and sell music NFTs from top Web3 artists on the TON blockchain. Join the decentralized music revolution.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tonjam.app">
    <meta property="og:image" content="https://tonjam.app/og-image.jpg">
    <meta property="og:site_name" content="Tonjam">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tonjam | Decentralized Music & NFT Marketplace on TON">
    <meta name="twitter:description" content="Discover, buy, and sell music NFTs from top Web3 artists on the TON blockchain. Join the decentralized music revolution.">
    <meta name="twitter:image" content="https://tonjam.app/og-image.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0B0F14;
            color: #FFFFFF;
            overflow-x: clip;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* JAM Coin Icon Visibility */
        img[src*="TonjamCoin"] {
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.3));
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .animate-marquee {
            animation: marquee 30s linear infinite;
        }

        .hero-gradient {
            background: linear-gradient(to right, #0B0F14 0%, rgba(11, 15, 20, 0) 60%, rgba(11, 15, 20, 0) 100%);
        }
        
        .hero-bottom-gradient {
            background: linear-gradient(to top, #0B0F14 0%, rgba(11, 15, 20, 0) 100%);
        }

        /* Custom typography refinements */
        h1, h2, h3, h4, h5, h6, .font-black {
          letter-spacing: -0.02em;
          line-height: 1.3;
        }

        /* TON Connect Button Theming */
        tc-root {
          --tc-accent-color: #2563EB;
          --tc-text-color: #ffffff;
          --tc-bg-color: #0B0F14;
        }

        .scroll-row {
          display: flex;
          overflow-x: auto;
          gap: 1rem;
          padding-bottom: 1rem;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
        }

        .scroll-row > * {
          scroll-snap-align: start;
        }
    </style>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
